<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新闻管理 · 欧阳聚德管理后台</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="admin-shell">
    <aside class="sidebar">
        <div class="sidebar-logo">欧阳聚德 · 后台</div>
        <nav class="sidebar-nav">
            <a href="dashboard.html">工作台</a>
            <a href="news.html" class="active">新闻管理</a>
            <a href="editor.html">页面内容</a>
            <a href="images.html">图片库</a>
            <a href="logs.html">操作日志</a>
        </nav>
    </aside>
    <main class="admin-main" id="news-page">
        <h1 class="page-title">新闻管理</h1>
        <p class="page-subtitle">粘贴公众号文章链接,自动抓取标题/封面/摘要</p>

        <div class="card">
            <h2>单条添加(粘 1 个公众号链接)</h2>
            <label>公众号文章 URL</label>
            <input type="url" placeholder="https://mp.weixin.qq.com/s/..." id="wechat-url-input">
            <button class="btn btn-primary" id="fetch-wechat-btn">抓取并添加</button>
            <p class="muted">抓到后先进入下方新闻列表,可继续改标题、摘要、分类和封面。已存在的同 URL 会更新不重复。</p>
        </div>

        <div class="card">
            <h2>批量导入(粘多个 URL,每行一个)</h2>
            <label>公众号文章 URL 列表</label>
            <textarea id="batch-urls" rows="6" placeholder="https://mp.weixin.qq.com/s/aaa
https://mp.weixin.qq.com/s/bbb
https://mp.weixin.qq.com/s/ccc"></textarea>
            <div class="form-row two">
                <label>默认分类(标题/摘要识别不到时用这个)
                    <select id="batch-category">
                        <option value="company">公司动态</option>
                        <option value="gov">党政动态</option>
                        <option value="case">客户案例</option>
                    </select>
                </label>
                <label>&nbsp;
                    <button class="btn btn-primary" id="batch-import-btn" type="button" style="width:100%;">开始批量导入</button>
                </label>
            </div>
            <p class="muted">每条会调一次微信 og:tag 抓取(标题 / 封面 / 摘要 / 日期),约 1-2 秒一条。批量 50 条预计 1-2 分钟。已存在的同 URL 会自动跳过。</p>
            <div id="batch-result" class="batch-result" hidden></div>
        </div>

        <div class="card">
            <div class="card-head">
                <h2>新闻列表 <span class="news-count muted" id="news-count"></span></h2>
                <div style="display:flex;gap:10px;">
                    <button class="btn btn-primary" id="save-news-btn" type="button">保存新闻列表</button>
                    <button class="btn btn-outline" type="button" data-publish>发布预演</button>
                </div>
            </div>
            <div class="news-toolbar">
                <input type="search" id="news-search" placeholder="搜标题或摘要..." class="news-search">
                <div class="news-filter-group" id="news-filter">
                    <button type="button" class="filter-pill active" data-filter="all">全部</button>
                    <button type="button" class="filter-pill" data-filter="company">公司动态</button>
                    <button type="button" class="filter-pill" data-filter="gov">党政动态</button>
                    <button type="button" class="filter-pill" data-filter="case">客户案例</button>
                </div>
                <p class="muted" style="font-size:12px; margin:4px 0 0;">↑/↓ 调顺序(顶上的显示在首页前面),改完点「保存新闻列表」+「发布预演」推上线。</p>
            </div>
            <div id="news-list" class="news-list"></div>
        </div>
    </main>
</div>
<script src="app.js"></script>
</body>
</html>
