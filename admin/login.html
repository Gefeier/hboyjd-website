<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 · 欧阳聚德官网管理后台</title>
<link rel="stylesheet" href="style.css">
<style>
.login-page { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--navy-900); padding: 20px; }
.login-card { background: white; border-radius: 12px; padding: 48px 44px; max-width: 420px; width: 100%; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.28); }
.login-logo { font-size: 22px; font-weight: 900; color: var(--navy-900); letter-spacing: 2px; margin-bottom: 8px; }
.login-sub { font-size: 13px; color: var(--gray-500); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 36px; }
.qr-placeholder { width: 220px; height: 220px; background: var(--gray-100); border-radius: 10px; margin: 0 auto 24px; display: flex; align-items: center; justify-content: center; color: var(--gray-500); font-size: 13px; border: 1px solid var(--gray-200); overflow:hidden; }
.qr-placeholder iframe { border: 0; width: 100%; height: 100%; }
.login-form { display: flex; flex-direction: column; gap: 14px; text-align: left; }
.login-form label { font-size: 12px; color: var(--gray-700); font-weight: 600; letter-spacing: 1px; }
.login-form input { padding: 12px 14px; font-size: 15px; border: 1px solid var(--gray-300); border-radius: 8px; background: var(--gray-50); transition: border-color 0.15s, background 0.15s; }
.login-form input:focus { outline: none; border-color: var(--navy-700); background: white; }
.login-form .btn { margin-top: 8px; padding: 13px 0; font-size: 15px; font-weight: 600; }
.login-hint { font-size: 14px; color: var(--gray-700); margin-top: 0; }
.login-error { font-size: 13px; color: #c0392b; min-height: 18px; margin: 4px 0 0; }
.login-actions { margin-top: 18px; }
[hidden] { display: none !important; }
</style>
</head>
<body>
<div class="login-page" id="login-page">
    <div class="login-card">
        <div class="login-logo">欧阳聚德 · 后台</div>
        <div class="login-sub">OYJD ADMIN</div>

        <!-- 钉钉扫码（仅 dingtalk 模式显示） -->
        <div id="login-dingtalk" hidden>
            <div class="qr-placeholder" id="qr-placeholder">钉钉扫码二维码</div>
            <p class="login-hint" id="login-message">正在获取登录二维码...</p>
        </div>

        <!-- 账号密码（默认） -->
        <form class="login-form" id="login-password-form" hidden autocomplete="on">
            <label for="login-username">账号</label>
            <input type="text" id="login-username" name="username" autocomplete="username" required autofocus>
            <label for="login-password">密码</label>
            <input type="password" id="login-password" name="password" autocomplete="current-password" required>
            <p class="login-error" id="login-error"></p>
            <button class="btn btn-primary" type="submit" id="login-submit">登 录</button>
        </form>

        <!-- mock 演示 -->
        <div class="login-actions" id="login-mock" hidden>
            <button class="btn btn-primary" id="login-enter-btn" type="button">进入本地演示</button>
        </div>
    </div>
</div>
<script src="app.js"></script>
</body>
</html>
