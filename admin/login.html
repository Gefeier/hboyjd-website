<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 · 欧阳聚德官网管理后台</title>
<link rel="stylesheet" href="style.css">
<style>
.login-page { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--navy-900); }
.login-card { background: white; border-radius: 12px; padding: 52px 44px; max-width: 420px; width: 90%; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.28); }
.login-logo { font-size: 22px; font-weight: 900; color: var(--navy-900); letter-spacing: 2px; margin-bottom: 8px; }
.login-sub { font-size: 13px; color: var(--gray-500); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 40px; }
.qr-placeholder { width: 220px; height: 220px; background: var(--gray-100); border-radius: 10px; margin: 0 auto 24px; display: flex; align-items: center; justify-content: center; color: var(--gray-500); font-size: 13px; border: 1px solid var(--gray-200); overflow:hidden; }
.qr-placeholder iframe { border: 0; width: 100%; height: 100%; }
.login-hint { font-size: 14px; color: var(--gray-700); }
.login-actions { margin-top: 24px; }
</style>
</head>
<body>
<div class="login-page" id="login-page">
    <div class="login-card">
        <div class="login-logo">欧阳聚德 · 后台</div>
        <div class="login-sub">OYJD ADMIN</div>
        <div class="qr-placeholder" id="qr-placeholder">钉钉扫码二维码</div>
        <p class="login-hint" id="login-message">正在获取登录二维码...</p>
        <div class="login-actions">
            <button class="btn btn-primary" id="login-enter-btn" type="button">进入本地演示</button>
        </div>
    </div>
</div>
<script src="app.js"></script>
</body>
</html>
